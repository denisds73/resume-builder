<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Resumefolio — a free, minimal resume builder. Edit, preview, and download as PDF." />
    <meta name="theme-color" content="#0D0D0D" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet" />
    <title>Resumefolio — free, minimal resume builder, export to PDF</title>
    <style>
      html, body { background: #0D0D0D; margin: 0; }
      #root { min-height: 100vh; }
      .bl-boot {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0D0D0D;
        transition: opacity 280ms ease;
      }
      .bl-boot.bl-boot-leave { opacity: 0; pointer-events: none; }
      .bl-boot svg { animation: bl-boot-glow 2.1s ease-in-out infinite; }
      .bl-boot .bl-fold { animation: bl-boot-fold 2.1s linear infinite; }
      .bl-boot .bl-line {
        stroke-dasharray: var(--len);
        stroke-dashoffset: var(--len);
        animation: bl-boot-draw 2.1s cubic-bezier(0.65,0,0.35,1) infinite;
      }
      .bl-boot .bl-line-1 { --len: 9;    --rest: 0.95; }
      .bl-boot .bl-line-2 { --len: 6.75; --rest: 0.55; animation-delay: 0.18s; }
      .bl-boot .bl-line-3 { --len: 9;    --rest: 0.55; animation-delay: 0.36s; }
      @keyframes bl-boot-draw {
        0%   { stroke-dashoffset: var(--len); opacity: 0; }
        12%  { opacity: 1; }
        45%  { stroke-dashoffset: 0; opacity: 1; }
        75%, 100% { stroke-dashoffset: 0; opacity: var(--rest); }
      }
      @keyframes bl-boot-glow {
        0%,100% { filter: drop-shadow(0 0 6px rgba(255,90,54,0)); }
        50%     { filter: drop-shadow(0 0 8px rgba(255,90,54,0.35)); }
      }
      @keyframes bl-boot-fold {
        0%,92%,100% { stroke: #FF5A36; }
        96%         { stroke: #FFB199; }
      }
      @media (prefers-reduced-motion: reduce) {
        .bl-boot svg, .bl-boot .bl-fold { animation: none; }
        .bl-boot .bl-line { stroke-dasharray: none; stroke-dashoffset: 0; animation: none; }
        .bl-boot .bl-line-1 { opacity: 0.95; }
        .bl-boot .bl-line-2, .bl-boot .bl-line-3 { opacity: 0.55; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="bl-boot" class="bl-boot" aria-label="Loading" role="status">
      <svg width="48" height="48" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.5" fill="none" stroke="rgba(240,237,230,0.08)"/>
        <path d="M9 7 h9.5 l4.5 4.5 v13 a1.25 1.25 0 0 1 -1.25 1.25 h-12.75 a1.25 1.25 0 0 1 -1.25 -1.25 v-16.25 a1.25 1.25 0 0 1 1.25 -1.25 z" fill="none" stroke="#FF5A36" stroke-width="1.5" stroke-linejoin="round"/>
        <path class="bl-fold" d="M18.5 7 v4.5 h4.5" fill="none" stroke="#FF5A36" stroke-width="1.5" stroke-linejoin="round"/>
        <line class="bl-line bl-line-1" x1="11.5" y1="15"   x2="20.5"  y2="15"   stroke="#F0EDE6" stroke-width="1.3" stroke-linecap="round"/>
        <line class="bl-line bl-line-2" x1="11.5" y1="18.5" x2="18.25" y2="18.5" stroke="#F0EDE6" stroke-width="1.3" stroke-linecap="round"/>
        <line class="bl-line bl-line-3" x1="11.5" y1="22"   x2="20.5"  y2="22"   stroke="#F0EDE6" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <script>
      window.__blBootStart = Date.now();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
