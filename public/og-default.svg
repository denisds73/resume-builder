<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g" cx="80%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#FF5A36" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#FF5A36" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FF5A36" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#F0EDE6" fill-opacity="0.04"/>
    </pattern>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F1EA"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0D0D0D"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- Brand mark: small coral document silhouette -->
  <g transform="translate(80,80)">
    <path d="M0 4 h26 l10 10 v34 a3 3 0 0 1 -3 3 h-33 a3 3 0 0 1 -3 -3 v-41 a3 3 0 0 1 3 -3 z"
          fill="none" stroke="#FF5A36" stroke-width="3" stroke-linejoin="round"/>
    <path d="M26 4 v10 h10" fill="none" stroke="#FF5A36" stroke-width="3" stroke-linejoin="round"/>
    <line x1="9" y1="22" x2="29" y2="22" stroke="#F0EDE6" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.9"/>
    <line x1="9" y1="30" x2="24" y2="30" stroke="#F0EDE6" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.55"/>
    <line x1="9" y1="38" x2="29" y2="38" stroke="#F0EDE6" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.55"/>
  </g>
  <text x="138" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#F0EDE6" fill-opacity="0.7" letter-spacing="2">RESUMEFOLIO</text>

  <!-- Hero wordmark -->
  <text x="80" y="340" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="118" fill="#F0EDE6">Beautiful</text>
  <text x="80" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="118" fill="#F0EDE6">resumes,</text>
  <text x="80" y="540" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#F0EDE6" fill-opacity="0.6">shared with one link.</text>

  <!-- Coral accent line -->
  <line x1="80" y1="560" x2="180" y2="560" stroke="#FF5A36" stroke-width="3" stroke-linecap="round"/>

  <!-- URL -->
  <text x="80" y="585" font-family="Menlo, Consolas, monospace" font-size="18" fill="#F0EDE6" fill-opacity="0.45">resumef.vercel.app</text>

  <!-- Right: a single resume thumbnail, slightly rotated -->
  <g transform="translate(820,90) rotate(4 180 240)">
    <rect x="0" y="0" width="320" height="450" rx="6" fill="url(#paper)"/>
    <rect x="0" y="0" width="320" height="450" rx="6" fill="none" stroke="#F0EDE6" stroke-opacity="0.08"/>
    <!-- Name -->
    <rect x="32" y="48" width="180" height="22" rx="2" fill="#111111"/>
    <rect x="32" y="80" width="100" height="9" rx="2" fill="#9a9a9a"/>
    <!-- Section headers + body lines -->
    <line x1="32" y1="120" x2="288" y2="120" stroke="#d9d9d9" stroke-width="1"/>
    <rect x="32" y="138" width="70" height="11" rx="2" fill="#111111"/>
    <rect x="32" y="160" width="240" height="6" rx="2" fill="#9a9a9a"/>
    <rect x="32" y="172" width="220" height="6" rx="2" fill="#9a9a9a"/>
    <rect x="32" y="184" width="246" height="6" rx="2" fill="#9a9a9a"/>
    <line x1="32" y1="208" x2="288" y2="208" stroke="#d9d9d9" stroke-width="1"/>
    <rect x="32" y="226" width="58" height="11" rx="2" fill="#111111"/>
    <rect x="32" y="248" width="234" height="6" rx="2" fill="#9a9a9a"/>
    <rect x="32" y="260" width="216" height="6" rx="2" fill="#9a9a9a"/>
    <rect x="32" y="272" width="244" height="6" rx="2" fill="#9a9a9a"/>
    <line x1="32" y1="296" x2="288" y2="296" stroke="#d9d9d9" stroke-width="1"/>
    <rect x="32" y="314" width="50" height="11" rx="2" fill="#111111"/>
    <rect x="32" y="336" width="222" height="6" rx="2" fill="#9a9a9a"/>
    <rect x="32" y="348" width="200" height="6" rx="2" fill="#9a9a9a"/>
    <line x1="32" y1="372" x2="288" y2="372" stroke="#d9d9d9" stroke-width="1"/>
    <rect x="32" y="390" width="64" height="11" rx="2" fill="#111111"/>
    <rect x="32" y="412" width="226" height="6" rx="2" fill="#9a9a9a"/>
  </g>
</svg>
